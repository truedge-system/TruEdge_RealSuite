name: TruEdge CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Vercel deployment
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail \
            && echo "✅ Vercel deploy triggered successfully" \
            || echo "⚠️ No VERCEL_DEPLOY_HOOK_URL set — skipping"

  smoke-test:
    name: TradingAgents Smoke Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install TradingAgents
        run: pip install tradingagents --quiet
      - name: Verify TradingAgents installed
        run: python3 -c "import tradingagents; print('✅ TradingAgents ready')"

