name: TruEdge CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Node deps
        run: npm ci
      - name: Install TradingAgents
        run: pip install tradingagents
      - name: Lint
        run: npm run lint --if-present
      - name: Test
        run: npm test --if-present

  trading-agents-smoke:
    name: TradingAgents Smoke Test
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      TRUEDGE_LLM_PROVIDER: ${{ secrets.TRUEDGE_LLM_PROVIDER }}
      TRUEDGE_DEEP_MODEL: ${{ secrets.TRUEDGE_DEEP_MODEL }}
      TRUEDGE_QUICK_MODEL: ${{ secrets.TRUEDGE_QUICK_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install TradingAgents
        run: pip install tradingagents
      - name: Run smoke analysis SPY
        run: |
          python3 packages/trading-agents/engine.py \
            --ticker SPY \
            --date $(date +%Y-%m-%d) \
            --output /tmp/truedge-signal.json
          cat /tmp/truedge-signal.json
      - name: Upload signal artifact
        uses: actions/upload-artifact@v4
        with:
          name: truedge-signal-${{ github.sha }}
          path: /tmp/truedge-signal.json

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Deploy to Vercel production
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --scope truedge-system

  deploy-fsi-agents:
    name: Deploy FSI Managed Agents
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deploy deps
        run: pip install requests pyyaml
      - name: Deploy all TruEdge FSI agents
        run: |
          for agent in pitch-agent meeting-prep-agent market-researcher \
            earnings-reviewer model-builder valuation-reviewer \
            gl-reconciler month-end-closer statement-auditor kyc-screener; do
            echo "Deploying $agent..."
            bash scripts/deploy-managed-agent.sh $agent || echo "Warning: $agent skipped"
          done
